name: Release Signed APK

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  release:
    name: Build & Release Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Decode keystore from secrets ─────────────────────
      # To set up:
      #   1. Generate a keystore:
      #      keytool -genkey -v -keystore maidcleaner.jks -keyalg RSA -keysize 2048 -validity 10000 -alias maidcleaner
      #   2. Base64 encode it:
      #      base64 -w 0 maidcleaner.jks > maidcleaner.jks.b64
      #   3. Add these GitHub secrets in Settings > Secrets and variables > Actions:
      #      KEYSTORE_BASE64   = content of maidcleaner.jks.b64
      #      KEYSTORE_PASSWORD = your keystore password
      #      KEY_ALIAS         = maidcleaner
      #      KEY_PASSWORD      = your key password

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/maidcleaner.jks

      - name: Build Signed Release APK
        env:
          KEYSTORE_FILE: maidcleaner.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=maidcleaner.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: maidcleaner-release-signed
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ── Create GitHub Release ────────────────────────────
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: MaidCleaner v${{ steps.version.outputs.VERSION }}
          body: |
            ## MaidCleaner v${{ steps.version.outputs.VERSION }}

            ### Changes
            - See commit history for details

            ### Downloads
            - `maidcleaner-release-signed/` → Signed release APK
            - `maidcleaner-debug/` → Debug APK (from CI build)

            ### Installation
            1. Download the APK
            2. Enable "Install from unknown sources" on your device
            3. Install the APK
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
